  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;

    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));

    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.

      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.

            'var tg = a.getAttribute("target");' +

            'if (h.charAt(0) !== "#") {' +

              'e.preventDefault();' +

              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');

      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';

      // would push the parser into quirks mode. DOMParser always emits a <head>

      // attributes through, so match the full opening tag.

        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).

      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.

          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

utton onclick=\"{{ sendMsg }}\" style=\"flex:none; width:42px; height:42px; border-radius:12px; border:none; cursor:pointer; background:linear-gradient(135deg,#7C3AED,#A855F7); display:flex; align-items:center; justify-content:center; box-shadow:0 10px 30px -12px rgba(139,92,246,.8);\" style-hover=\"\">\n                  <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"22\" y1=\"2\" x2=\"11\" y2=\"13\"><\u002Fline><polygon points=\"22 2 15 22 11 13 2 9 22 2\"><\u002Fpolygon><\u002Fsvg>\n                <\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"width:282px; flex:none; border-left:1px solid rgba(255,255,255,0.06); padding:18px; overflow-y:auto;\">\n            <div style=\"font-size:11px; color:#6B6B76; letter-spacing:.06em; margin-bottom:12px;\">CONTEXTO DO LEAD<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:10px;\">\n              <div style=\"display:flex; justify-content:space-between; padding-bottom:9px; border-bottom:1px solid rgba(255,255,255,0.05);\"><span style=\"font-size:12.5px; color:#6B6B76;\">Estágio<\u002Fspan><span style=\"font-size:12.5px; font-weight:500;\">{{ selStage }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; justify-content:space-between; padding-bottom:9px; border-bottom:1px solid rgba(255,255,255,0.05);\"><span style=\"font-size:12.5px; color:#6B6B76;\">Valor<\u002Fspan><span style=\"font-size:12.5px; font-weight:500;\">{{ selValue }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; justify-content:space-between; align-items:center; padding-bottom:9px; border-bottom:1px solid rgba(255,255,255,0.05);\"><span style=\"font-size:12.5px; color:#6B6B76;\">Score<\u002Fspan><span style=\"font-family:'Space Grotesk'; font-weight:600; color:#B388FF;\">{{ selScore }}<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"margin-top:16px; border-radius:13px; border:1px solid rgba(139,92,246,0.25); background:rgba(139,92,246,0.08); padding:13px;\">\n              <div style=\"font-size:10.5px; font-weight:600; color:#B388FF; margin-bottom:6px;\">PRÓXIMA AÇÃO (IA)<\u002Fdiv>\n              <div style=\"font-size:12px; line-height:1.45;\">Responder a dúvida sobre garantia e oferecer o link de pagamento com o bônus de hoje.<\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ goPipeline }}\" style=\"margin-top:14px; width:100%; padding:10px; border-radius:11px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.04); color:#F4F4F7; font-family:'Plus Jakarta Sans'; font-weight:600; font-size:12.5px; cursor:pointer;\" style-hover=\"border-color:rgba(139,92,246,0.4);\">Mover estágio<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- SDR DE IA (page) -->\n      <sc-if value=\"{{ isSdr }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:24px 28px 60px;\">\n          <div style=\"display:flex; gap:2px; border-bottom:1px solid rgba(255,255,255,0.06); margin-bottom:24px; position:sticky; top:0; background:#08080B; z-index:5;\">\n            <sc-for list=\"{{ sdrPageTabs }}\" as=\"t\" hint-placeholder-count=\"4\"><button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.label }}<\u002Fbutton><\u002Fsc-for>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ isSdrPersona }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:grid; grid-template-columns:1fr 360px; gap:24px;\">\n              <div style=\"display:flex; flex-direction:column; gap:18px;\">\n                <div><label style=\"display:block; font-size:12.5px; font-weight:600; margin-bottom:7px;\">Nome do assistente<span style=\"color:#B388FF;\">*<\u002Fspan><\u002Flabel><input value=\"Nina\" style=\"width:100%; border-radius:11px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.03); color:#F4F4F7; padding:11px 13px; font-family:'Plus Jakarta Sans'; font-size:13px;\"><\u002Fdiv>\n                <div><label style=\"display:block; font-size:12.5px; font-weight:600; margin-bottom:7px;\">Fala como<\u002Flabel><select style=\"width:100%; appearance:none; border-radius:11px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.03); color:#F4F4F7; padding:11px 13px; font-family:'Plus Jakarta Sans'; font-size:13px;\"><option>Você (o dono)<\u002Foption><option>O Mentor<\u002Foption><option>A Equipe<\u002Foption><\u002Fselect><\u002Fdiv>\n                <div><div style=\"font-size:12.5px; font-weight:600; margin-bottom:9px;\">Tom<\u002Fdiv><div style=\"display:flex; gap:4px; padding:4px; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);\"><sc-for list=\"{{ toneOpts }}\" as=\"o\" hint-placeholder-count=\"3\"><button onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n                <div><div style=\"font-size:12.5px; font-weight:600; margin-bottom:9px;\">Tamanho das mensagens<\u002Fdiv><div style=\"display:flex; gap:4px; padding:4px; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); max-width:240px;\"><sc-for list=\"{{ sizeOpts }}\" as=\"o\" hint-placeholder-count=\"2\"><button onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n                <div onclick=\"{{ toggleEmoji }}\" style=\"display:flex; align-items:center; justify-content:space-between; padding:12px 0; cursor:pointer; border-top:1px solid rgba(255,255,255,0.05);\"><span style=\"font-size:13px;\">Usa emojis<\u002Fspan><span style=\"{{ emojiTrack }}\"><span style=\"{{ emojiKnob }}\"><\u002Fspan><\u002Fspan><\u002Fdiv>\n                <div onclick=\"{{ toggleSched }}\" style=\"display:flex; align-items:center; justify-content:space-between; padding:12px 0; cursor:pointer; border-top:1px solid rgba(255,255,255,0.05);\"><div><div style=\"font-size:13px;\">Ativa 24/7<\u002Fdiv><div style=\"font-size:11.5px; color:#6B6B76;\">Desligue para limitar a uma janela de horário.<\u002Fdiv><\u002Fdiv><span style=\"{{ schedTrack }}\"><span style=\"{{ schedKnob }}\"><\u002Fspan><\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"align-self:start; position:sticky; top:60px; border-radius:16px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); padding:18px; box-shadow:inset 0 1px 0 rgba(255,255,255,0.06);\">\n                <div style=\"font-size:11px; color:#6B6B76; letter-spacing:.05em; margin-bottom:14px;\">PRÉVIA DA MENSAGEM<\u002Fdiv>\n                <div style=\"display:flex; flex-direction:column; gap:10px;\">\n                  <div style=\"align-self:flex-start; max-width:85%; padding:10px 13px; border-radius:14px 14px 14px 4px; background:#1A1A25; font-size:12.5px;\">Oi! Quanto custa o curso?<\u002Fdiv>\n                  <div style=\"align-self:flex-end; max-width:85%; padding:10px 13px; border-radius:14px 14px 4px 14px; background:linear-gradient(135deg,#7C3AED,#8B5CF6); color:#fff; font-size:12.5px;\">Oi! O curso \"IA na Liderança\" é R$ 1.997, em até 12x. Quer que eu te mostre o que está incluso antes?<\u002Fdiv>\n                  <span style=\"align-self:flex-end; font-size:10px; color:#6B6B76;\">Nina · IA<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ isSdrModos }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"border-radius:13px; border:1px solid rgba(139,92,246,0.25); background:rgba(139,92,246,0.07); padding:15px; margin-bottom:20px; display:flex; gap:11px;\">\n              <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#B388FF\" stroke-width=\"1.6\" style=\"flex:none; margin-top:1px;\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 8v4l3 2\"><\u002Fpath><\u002Fsvg>\n              <div style=\"font-size:12.5px; color:#C9B6FF; line-height:1.5;\">O agente pode ter até 3 modos de atuação (o \"sentimento\" e o jeito de conduzir a conversa). Configure cada modo aqui na plataforma OU anexe um arquivo markdown. Escolha qual modo fica ativo por padrão.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:24px;\">\n              <sc-for list=\"{{ modeSlots }}\" as=\"m\" hint-placeholder-count=\"3\">\n                <div style=\"{{ m.cardStyle }}\">\n                  <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;\">\n                    <input value=\"{{ m.name }}\" style=\"background:none; border:none; color:#F4F4F7; font-family:'Space Grotesk'; font-size:15px; font-weight:600; width:60%; outline:none;\">\n                    <sc-if value=\"{{ m.active }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:10px; color:#B388FF; background:rgba(139,92,246,0.16); padding:2px 9px; border-radius:999px;\">Ativo<\u002Fspan><\u002Fsc-if>\n                  <\u002Fdiv>\n                  <div style=\"display:flex; gap:4px; padding:4px; border-radius:10px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); margin-bottom:14px;\">\n                    <button onclick=\"{{ m.setPlatform }}\" style=\"{{ m.platStyle }}; font-size:11px; padding:7px;\">Plataforma<\u002Fbutton>\n                    <button onclick=\"{{ m.setMarkdown }}\" style=\"{{ m.mdStyle }}; font-size:11px; padding:7px;\">Markdown<\u002Fbutton>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ m.isPlatform }}\" hint-placeholder-val=\"{{ true }}\">\n                    <div style=\"display:flex; flex-direction:column; gap:10px;\">\n                      <input placeholder=\"Sentimento / tom\" style=\"width:100%; border-radius:9px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.03); color:#F4F4F7; padding:9px 11px; font-size:12px; font-family:'Plus Jakarta Sans';\">\n                      <textarea placeholder=\"Como conduzir a conversa…\" style=\"width:100%; min-height:58px; resize:vertical; border-radius:9px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.03); color:#F4F4F7; padding:9px 11px; font-size:12px; font-family:'Plus Jakarta Sans';\"><\u002Ftextarea>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ m.isMarkdown }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"border-radius:10px; border:1px dashed rgba(139,92,246,0.4); background:rgba(139,92,246,0.05); padding:16px; text-align:center;\">\n                      <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#B388FF\" stroke-width=\"1.5\" style=\"margin-bottom:6px;\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><polyline points=\"14 2 14 8 20 8\"><\u002Fpolyline><\u002Fsvg>\n                      <div style=\"font-size:11.5px; color:#C9B6FF;\">persona-modo.md<\u002Fdiv>\n                      <div style=\"font-size:10px; color:#6B6B76; margin-top:2px;\">2,4 KB<\u002Fdiv>\n                      <div style=\"display:flex; gap:6px; justify-content:center; margin-top:10px;\"><span style=\"font-size:10.5px; color:#A1A1AA; cursor:pointer;\">Substituir<\u002Fspan><span style=\"font-size:10.5px; color:#FB7185; cursor:pointer;\">Remover<\u002Fspan><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <button onclick=\"{{ m.setActive }}\" style=\"margin-top:14px; width:100%; padding:8px; border-radius:9px; border:1px solid rgba(255,255,255,0.12); background:transparent; color:#A1A1AA; font-family:'Plus Jakarta Sans'; font-size:11.5px; font-weight:600; cursor:pointer;\" style-hover=\"border-color:rgba(139,92,246,0.4); color:#C9B6FF;\">Definir como ativo<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:11px; padding:13px 16px; border-radius:12px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); margin-bottom:18px;\">\n              <span style=\"font-size:12.5px; color:#A1A1AA;\">Limite: <span style=\"color:#F4F4F7;\">máximo 3 arquivos markdown<\u002Fspan> somando todos os modos.<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"border-radius:16px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); overflow:hidden;\">\n              <div style=\"padding:16px 18px; border-bottom:1px solid rgba(255,255,255,0.06); display:flex; align-items:center; justify-content:space-between;\">\n                <div style=\"font-weight:600; font-size:14px;\">Como montar o arquivo markdown<\u002Fdiv>\n                <div style=\"display:flex; gap:8px;\"><button onclick=\"{{ copyTemplate }}\" style=\"padding:7px 13px; border-radius:9px; border:1px solid rgba(139,92,246,0.4); background:rgba(139,92,246,0.1); color:#C9B6FF; font-family:'Plus Jakarta Sans'; font-size:11.5px; font-weight:600; cursor:pointer;\">Copiar template<\u002Fbutton><button onclick=\"{{ downloadTemplate }}\" style=\"padding:7px 13px; border-radius:9px; border:1px solid rgba(255,255,255,0.12); background:transparent; color:#A1A1AA; font-family:'Plus Jakarta Sans'; font-size:11.5px; font-weight:600; cursor:pointer;\">Baixar .md<\u002Fbutton><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"padding:14px 18px; font-size:12px; color:#A1A1AA; line-height:1.55;\">O arquivo vira contexto/persona da IA (via RAG): o agente lê esse markdown para saber quem é, como fala e o que nunca pode fazer. Estrutura recomendada:<\u002Fdiv>\n              <pre style=\"margin:0; padding:0 18px 18px; font-family:ui-monospace,monospace; font-size:11.5px; color:#C9B6FF; line-height:1.6; white-space:pre-wrap;\">{{ mdTemplate }}<\u002Fpre>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ isSdrPlaybooks }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex; flex-direction:column; gap:10px;\">\n              <sc-for list=\"{{ playbookStages }}\" as=\"p\" hint-placeholder-count=\"6\">\n                <div onclick=\"{{ p.open }}\" style=\"display:flex; align-items:center; gap:13px; padding:15px 18px; border-radius:14px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); cursor:pointer;\" style-hover=\"border-color:rgba(139,92,246,0.4); background:rgba(139,92,246,0.06);\">\n                  <span style=\"width:10px; height:10px; border-radius:50%; background:{{ p.color }};\"><\u002Fspan>\n                  <div style=\"flex:1;\"><div style=\"font-weight:600; font-size:13.5px;\">{{ p.name }}<\u002Fdiv><div style=\"font-size:12px; color:#A1A1AA; margin-top:2px;\">{{ p.playbook }}<\u002Fdiv><\u002Fdiv>\n                  <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6B6B76\" stroke-width=\"1.8\" stroke-linecap=\"round\"><path d=\"M9 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ isSdrGuard }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"max-width:680px; display:flex; flex-direction:column; gap:4px;\">\n              <sc-for list=\"{{ guardItems }}\" as=\"g\" hint-placeholder-count=\"6\">\n                <div onclick=\"{{ g.toggle }}\" style=\"display:flex; align-items:center; justify-content:space-between; padding:15px 18px; border-radius:13px; border:1px solid rgba(255,255,255,0.07); background:rgba(255,255,255,0.02); cursor:pointer;\">\n                  <span style=\"font-size:13px;\">{{ g.label }}<\u002Fspan><span style=\"{{ g.track }}\"><span style=\"{{ g.knob }}\"><\u002Fspan><\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <div style=\"margin-top:14px;\"><label style=\"display:block; font-size:12.5px; font-weight:600; margin-bottom:9px;\">Palavras que disparam handoff para humano<\u002Flabel>\n                <div style=\"display:flex; flex-wrap:wrap; gap:7px; padding:11px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.03);\">\n                  <span style=\"display:flex; align-items:center; gap:6px; padding:5px 11px; border-radius:999px; background:rgba(139,92,246,0.14); border:1px solid rgba(139,92,246,0.3); font-size:12px;\">cancelar <span style=\"color:#A1A1AA; cursor:pointer;\">×<\u002Fspan><\u002Fspan>\n                  <span style=\"display:flex; align-items:center; gap:6px; padding:5px 11px; border-radius:999px; background:rgba(139,92,246,0.14); border:1px solid rgba(139,92,246,0.3); font-size:12px;\">reembolso <span style=\"color:#A1A1AA; cursor:pointer;\">×<\u002Fspan><\u002Fspan>\n                  <span style=\"display:flex; align-items:center; gap:6px; padding:5px 11px; border-radius:999px; background:rgba(139,92,246,0.14); border:1px solid rgba(139,92,246,0.3); font-size:12px;\">advogado <span style=\"color:#A1A1AA; cursor:pointer;\">×<\u002Fspan><\u002Fspan>\n                  <input placeholder=\"Adicionar palavra…\" style=\"flex:1; min-width:120px; border:none; background:transparent; color:#F4F4F7; font-family:'Plus Jakarta Sans'; font-size:12.5px; outline:none;\">\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ isSdrCad }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"max-width:680px;\">\n              <div style=\"font-size:13px; color:#A1A1AA; margin-bottom:16px;\">Sequência de toques antes de marcar como \"Não respondeu\". Cada toque pode ser gerado com IA.<\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:0;\">\n                <sc-for list=\"{{ cadencias }}\" as=\"c\" hint-placeholder-count=\"6\">\n                  <div style=\"display:flex; align-items:center; gap:14px; padding:14px 0; border-bottom:1px solid rgba(255,255,255,0.06);\">\n                    <span style=\"font-family:'Space Grotesk'; font-weight:600; font-size:14px; width:62px; color:#B388FF;\">{{ c.t }}<\u002Fspan>\n                    <div style=\"flex:1;\"><div style=\"font-size:13px;\">após {{ c.when }}<\u002Fdiv><div style=\"font-size:11.5px; color:#6B6B76;\">canal: {{ c.ch }}<\u002Fdiv><\u002Fdiv>\n                    <button style=\"padding:7px 13px; border-radius:9px; border:1px solid rgba(139,92,246,0.4); background:rgba(139,92,246,0.1); color:#C9B6FF; font-family:'Plus Jakarta Sans'; font-size:11.5px; font-weight:600; cursor:pointer;\">Gerar texto com IA<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"margin-top:18px;\"><label style=\"display:block; font-size:12.5px; font-weight:600; margin-bottom:7px;\">Máximo de toques<span style=\"color:#B388FF;\">*<\u002Fspan><\u002Flabel><input value=\"6\" style=\"width:120px; border-radius:11px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.03); color:#F4F4F7; padding:11px 13px; font-family:'Plus Jakarta Sans'; font-size:13px;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- CAMPANHAS LIST -->\n      <sc-if value=\"{{ campShowList }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:24px 28px 60px;\">\n          <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:20px;\">\n            <span style=\"padding:7px 14px; border-radius:999px; background:rgba(139,92,246,0.14); border:1px solid rgba(139,92,246,0.4); font-size:12.5px;\">Todas<\u002Fspan>\n            <span style=\"padding:7px 14px; border-radius:999px; border:1px solid rgba(255,255,255,0.08); font-size:12.5px; color:#A1A1AA;\">Ativas<\u002Fspan>\n            <span style=\"padding:7px 14px; border-radius:999px; border:1px solid rgba(255,255,255,0.08); font-size:12.5px; color:#A1A1AA;\">Pausadas<\u002Fspan>\n            <span style=\"padding:7px 14px; border-radius:999px; border:1px solid rgba(255,255,255,0.08); font-size:12.5px; color:#A1A1AA;\">Rascunhos<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:16px;\">\n            <sc-for list=\"{{ campaigns }}\" as=\"c\" hint-placeholder-count=\"4\">\n              <div onclick=\"{{ c.open }}\" style=\"border-radius:16px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); padding:20px; cursor:pointer; box-shadow:inset 0 1px 0 rgba(255,255,255,0.06);\" style-hover=\"border-color:rgba(139,92,246,0.4);\">\n                <div style=\"display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:6px;\">\n                  <div style=\"font-family:'Space Grotesk'; font-size:16px; font-weight:600;\">{{ c.name }}<\u002Fdiv>\n                  <span style=\"display:flex; align-items:center; gap:5px; font-size:11px; color:#A1A1AA;\"><span style=\"width:7px; height:7px; border-radius:50%; background:{{ c.statusColor }};\"><\u002Fspan>{{ c.status }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex; gap:8px; margin-bottom:18px;\"><span style=\"padding:3px 9px; border-radius:999px; font-size:10.5px; font-weight:600; color:{{ c.typeColor }}; background:rgba(139,92,246,0.1); border:1px solid rgba(139,92,246,0.2);\">{{ c.type }}<\u002Fspan><span style=\"font-size:11.5px; color:#6B6B76;\">{{ c.channel }}<\u002Fspan><\u002Fdiv>\n                <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:10px;\">\n                  <div><div style=\"font-family:'Space Grotesk'; font-weight:600; font-size:17px;\">{{ c.leads }}<\u002Fdiv><div style=\"font-size:10.5px; color:#6B6B76;\">leads<\u002Fdiv><\u002Fdiv>\n                  <div><div style=\"font-family:'Space Grotesk'; font-weight:600; font-size:17px;\">{{ c.conv }}<\u002Fdiv><div style=\"font-size:10.5px; color:#6B6B76;\">conversões<\u002Fdiv><\u002Fdiv>\n                  <div><div style=\"font-family:'Space Grotesk'; font-weight:600; font-size:17px;\">{{ c.cpl }}<\u002Fdiv><div style=\"font-size:10.5px; color:#6B6B76;\">CPL<\u002Fdiv><\u002Fdiv>\n                  <div><div style=\"font-family:'Space Grotesk'; font-weight:600; font-size:17px; color:#34D399;\">{{ c.rev }}<\u002Fdiv><div style=\"font-size:10.5px; color:#6B6B76;\">receita<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- CAMPAIGN DETAIL -->\n      <sc-if value=\"{{ campShowDetail }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:24px 28px 60px;\">\n          <button onclick=\"{{ backToCampList }}\" style=\"display:flex; align-items:center; gap:7px; padding:6px 0; background:none; border:none; color:#A1A1AA; font-family:'Plus Jakarta Sans'; font-size:12.5px; cursor:pointer; margin-bottom:14px;\" style-hover=\"color:#F4F4F7;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg>Voltar para campanhas<\u002Fbutton>\n          <div style=\"display:flex; align-items:flex-start; gap:14px; margin-bottom:20px;\">\n            <div style=\"flex:1;\">\n              <div style=\"display:flex; align-items:center; gap:10px;\"><h2 style=\"font-family:'Space Grotesk'; font-size:22px; font-weight:600; margin:0;\">Live IA na Liderança<\u002Fh2><span style=\"padding:3px 10px; border-radius:999px; font-size:10.5px; font-weight:600; color:#B388FF; background:rgba(139,92,246,0.1); border:1px solid rgba(139,92,246,0.2);\">Lançamento/Live<\u002Fspan><span style=\"display:flex; align-items:center; gap:5px; font-size:11.5px; color:#34D399;\"><span style=\"width:7px;height:7px;border-radius:50%;background:#34D399;\"><\u002Fspan>Ativa<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:12.5px; color:#A1A1AA; margin-top:4px;\">Meta + Orgânico · Curso IA na Liderança · usa a LP \"Inscrição Live\"<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex; gap:8px;\">\n              <button onclick=\"{{ editCampaign }}\" style=\"padding:9px 15px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.04); color:#F4F4F7; font-family:'Plus Jakarta Sans'; font-size:12.5px; font-weight:600; cursor:pointer;\" style-hover=\"border-color:rgba(139,92,246,0.4);\">Editar<\u002Fbutton>\n              <button onclick=\"{{ toggleCampaign }}\" style=\"padding:9px 15px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.04); color:#F4F4F7; font-family:'Plus Jakarta Sans'; font-size:12.5px; font-weight:600; cursor:pointer;\" style-hover=\"border-color:rgba(251,191,36,0.4);\">Pausar<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:2px; border-bottom:1px solid rgba(255,255,255,0.06); margin-bottom:22px;\"><sc-for list=\"{{ campDetailTabs }}\" as=\"t\" hint-placeholder-count=\"5\"><button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv>\n          <sc-if value=\"{{ isCampOverview }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:18px;\">\n              <div style=\"border-radius:14px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); padding:16px;\"><div style=\"font-family:'Space Grotesk'; font-size:22px; font-weight:600;\">142<\u002Fdiv><div style=\"font-size:11px; color:#6B6B76;\">leads<\u002Fdiv><\u002Fdiv>\n              <div style=\"border-radius:14px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); padding:16px;\"><div style=\"font-family:'Space Grotesk'; font-size:22px; font-weight:600;\">18<\u002Fdiv><div style=\"font-size:11px; color:#6B6B76;\">conversões<\u002Fdiv><\u002Fdiv>\n              <div style=\"border-radius:14px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); padding:16px;\"><div style=\"font-family:'Space Grotesk'; font-size:22px; font-weight:600;\">R$ 6,80<\u002Fdiv><div style=\"font-size:11px; color:#6B6B76;\">CPL<\u002Fdiv><\u002Fdiv>\n              <div style=\"border-radius:14px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); padding:16px;\"><div style=\"font-family:'Space Grotesk'; font-size:22px; font-weight:600; color:#34D399;\">4,4x<\u002Fdiv><div style=\"font-size:11px; color:#6B6B76;\">ROAS<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border-radius:16px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); padding:20px; margin-bottom:16px;\">\n              <div style=\"font-weight:600; font-size:14px; margin-bottom:14px;\">Receita da campanha<\u002Fdiv>\n              <svg viewBox=\"0 0 600 120\" style=\"width:100%; height:120px;\"><defs><linearGradient id=\"cdrev\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"rgba(168,85,247,0.4)\"><\u002Fstop><stop offset=\"1\" stop-color=\"rgba(168,85,247,0)\"><\u002Fstop><\u002FlinearGradient><\u002Fdefs><path d=\"M0,100 C80,90 140,60 220,55 C320,48 360,20 460,25 C540,29 580,12 600,14 L600,120 L0,120 Z\" fill=\"url(#cdrev)\"><\u002Fpath><path d=\"M0,100 C80,90 140,60 220,55 C320,48 360,20 460,25 C540,29 580,12 600,14\" fill=\"none\" stroke=\"#B388FF\" stroke-width=\"2\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"border-radius:14px; border:1px solid rgba(139,92,246,0.25); background:rgba(139,92,246,0.07); padding:16px; display:flex; gap:11px;\">\n              <span style=\"width:8px;height:8px;border-radius:50%;background:#B388FF;animation:vf-pulse 2s infinite;margin-top:4px;flex:none;\"><\u002Fspan>\n              <div><div style=\"font-size:11px; font-weight:600; color:#B388FF; margin-bottom:4px;\">SUGESTÕES DA IA<\u002Fdiv><div style=\"font-size:13px; line-height:1.45;\">CPL ótimo, mas a LP converte 38% no mobile e 19% no desktop — teste a variante B no desktop para subir o ROAS.<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ isCampAds }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:14px;\">\n              <div style=\"border-radius:14px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); padding:16px;\"><div style=\"font-weight:600; font-size:13.5px;\">Liderar virou outra coisa<\u002Fdiv><div style=\"font-size:11.5px; color:#A1A1AA; margin:8px 0;\">Vídeo curto · Meta<\u002Fdiv><div style=\"display:flex; gap:14px; font-size:11px; color:#6B6B76;\"><span>CTR 2,4%<\u002Fspan><span>CPL R$ 6,80<\u002Fspan><\u002Fdiv><\u002Fdiv>\n              <div style=\"border-radius:14px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); padding:16px;\"><div style=\"font-weight:600; font-size:13.5px;\">A IA não vai te substituir<\u002Fdiv><div style=\"font-size:11.5px; color:#A1A1AA; margin:8px 0;\">Imagem única · Meta<\u002Fdiv><div style=\"display:flex; gap:14px; font-size:11px; color:#6B6B76;\"><span>CTR 1,9%<\u002Fspan><span>CPL R$ 7,40<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ isCampLeads }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"border-radius:16px; border:1px solid rgba(255,255,255,0.08); overflow:hidden;\">\n              <div style=\"display:grid; grid-template-columns:2fr 1fr 1fr 1fr; padding:13px 18px; font-size:11px; color:#6B6B76; border-bottom:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.02);\"><span>LEAD<\u002Fspan><span>ESTÁGIO<\u002Fspan><span>VALOR<\u002Fspan><span>STATUS IA<\u002Fspan><\u002Fdiv>\n              <div style=\"display:grid; grid-template-columns:2fr 1fr 1fr 1fr; padding:14px 18px; border-bottom:1px solid rgba(255,255,255,0.05); font-size:13px;\"><span>Eduardo Pinheiro<\u002Fspan><span style=\"color:#A1A1AA;\">Qualificado<\u002Fspan><span>R$ 1.997<\u002Fspan><span style=\"color:#C9B6FF;\">IA cuidando<\u002Fspan><\u002Fdiv>\n              <div style=\"display:grid; grid-template-columns:2fr 1fr 1fr 1fr; padding:14px 18px; font-size:13px;\"><span>João Mendonça<\u002Fspan><span style=\"color:#A1A1AA;\">Em negociação<\u002Fspan><span>R$ 1.997<\u002Fspan><span style=\"color:#FBBF24;\">Aguardando você<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ isCampAuto }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"border-radius:14px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); padding:18px; font-size:13px; color:#A1A1AA; line-height:1.6;\">A cadência da IA para leads desta campanha segue o playbook de cada estágio do Pipeline. Sequência de aquecimento da live: <span style=\"color:#F4F4F7;\">T+0 confirmação · T-1d lembrete · T-1h \"estamos começando\"<\u002Fspan>.<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ isCampLp }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"border-radius:14px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); padding:18px;\">\n              <div style=\"font-weight:600; font-size:13.5px;\">Inscrição Live<\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:8px; margin-top:10px;\"><span style=\"font-family:'Space Grotesk'; font-size:13px; color:#B388FF;\">vendaflo n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ isAnunSugestoes }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:14px;\">\n              <div style=\"border-radius:14px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); padding:18px;\"><div style=\"font-weight:600; font-size:14px;\">Líderes 30-45 · Meta<\u002Fdiv><div style=\"font-size:12px; color:#A1A1AA; margin:8px 0 12px;\">Cargos de gestão, interesse em produtividade. Verba sugerida R$ 80/dia.<\u002Fdiv><button style=\"padding:8px 14px; border-radius:9px; border:1px solid rgba(139,92,246,0.4); background:rgba(139,92,246,0.1); color:#C9B6FF; font-family:'Plus Jakarta Sans'; font-size:12px; font-weight:600; cursor:pointer;\">Usar na campanha<\u002Fbutton><\u002Fdiv>\n              <div style=\"border-radius:14px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); padding:18px;\"><div style=\"font-weight:600; font-size:14px;\">Busca Google · \"curso liderança IA\"<\u002Fdiv><div style=\"font-size:12px; color:#A1A1AA; margin:8px 0 12px;\">Intenção alta. Verba sugerida R$ 50/dia. Configure conversão de WhatsApp.<\u002Fdiv><button style=\"padding:8px 14px; border-radius:9px; border:1px solid rgba(139,92,246,0.4); background:rgba(139,92,246,0.1); color:#C9B6FF; font-family:'Plus Jakarta Sans'; font-size:12px; font-weight:600; cursor:pointer;\">Usar na campanha<\u002Fbutton><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- CONTEXTO -->\n      <sc-if value=\"{{ isContexto }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:24px 28px 60px;\">\n          <div style=\"display:flex; align-items:center; gap:11px; padding:13px 16px; border-radius:13px; background:rgba(139,92,246,0.07); border:1px solid rgba(139,92,246,0.22); margin-bottom:18px;\">\n            <svg width=\"17\" height= era templates de e-mail e outras saídas visuais — para seguir sua marca, cores, tipografia e tom.<\u002Fdiv>\n                  <div style=\"display:flex; gap:8px; margin-top:14px; flex-wrap:wrap;\">\n                    <button onclick=\"{{ openContext }}\" style=\"padding:8px 14px; border-radius:9px; border:none; background:linear-gradient(135deg,#7C3AED,#A855F7); color:#fff; font-family:'Plus Jakarta Sans'; font-size:12px; font-weight:600; cursor:pointer;\">Enviar .md<\u002Fbutton>\n                    <button onclick=\"{{ downloadDsTemplate }}\" style=\"padding:8px 14px; border-radius:9px; border:1px solid rgba(255,255,255,0.12); background:transparent; color:#A1A1AA; font-family:'Plus Jakarta Sans'; font-size:12px; font-weight:600; cursor:pointer;\">Baixar exemplo .md<\u002Fbutton>\n                    <button onclick=\"{{ copyDsTemplate }}\" style=\"padding:8px 14px; border-radius:9px; border:1px solid rgba(255,255,255,0.12); background:transparent; color:#A1A1AA; font-family:'Plus Jakarta Sans'; font-size:12px; font-weight:600; cursor:pointer;\">Copiar template<\u002Fbutton>\n                  <\u002Fdiv>\n                  <div style=\"margin-top:10px; display:flex; align-items:center; gap:7px; font-size:11px; color:#34D399;\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>design-system.md · indexado<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <pre style=\"margin:14px 0 0; padding:14px; border-radius:11px; background:rgba(0,0,0,0.3); font-family:ui-monospace,monospace; font-size:11px; color:#C9B6FF; line-height:1.6; white-space:pre-wrap; overflow-x:auto;\">{{ dsTemplate }}<\u002Fpre>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px;\">\n            <div onclick=\"{{ openContext }}\" style=\"pa holder-val=\"{{ false }}\">\n            <div style=\"display:flex; flex-direction:column; gap:10px;\">\n              <div style=\"display:flex; align-items:center; gap:12px; padding:15px 18px; border-radius:13px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03);\"><div style=\"flex:1;\"><div style=\"font-weight:600; font-size:13.5px;\">Líderes RH · São Paulo<\u002Fdiv><div style=\"font-size:11.5px; color:#6B6B76;\">LinkedIn · 48 prospects<\u002Fdiv><\u002Fdiv><span style=\"font-size:11px; color:#34D399;\">Pronta<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:12px; padding:15px 18px; border-radius:13px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03);\"><div style=\"flex:1;\"><div style=\"font-weight:600; font-size:13.5px;\">Leads sumidos · Q2<\u002Fdiv><div style=\"font-size:11.5px; color:#6B6B76;\">CRM · 87 prospects<\u002Fdiv><\u002Fdiv><span style=\"font-size:11px; color:#FBBF24;\">Em abordagem<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ isProspAbordagens }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex; align-items:center; gap:11px; padding:13px 16px; border-radius:13px; background:rgba(251,191,36,0.08); border:1px solid rgba(251,191,36,0.25); margin-bottom:12px;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FBBF24\" stroke-width=\"1.8\"><path d=\"M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z\"><\u002Fpath><\u002Fsvg><span style=\"font-size:12.5px; color:#F4F4F7;\">Disparos em massa exigem sua aprovação. Revise cada mensagem abaixo.<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:9px; padding:11px 16px; border-radius:12px; background:rgba(139,92,246,0.07); border:1px solid rgba(139,92,246,0.22); margin-bottom:16px;\">\n              <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#B388FF\" stroke-width=\"1.8\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n              <span style=\"font-size:12px; color:#C9B6FF; line-height:1.4;\">A abordagem usa a mesma persona e contexto do SDR. Ao aprovar: o prospect <span style=\"color:#F4F4F7;\">vira lead<\u002Fspan>, entra no Pipeline (origem Prospecção) e a IA <span style=\"color:#F4F4F7;\">continua a conversa<\u002Fspan> a partir desta mensagem, no Inbox.<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:12px;\">\n              <div style=\"border-radius:14px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); padding:16px;\"><div style=\"display:flex; align-items:center; gap:10px; margin-bottom:10px;\"><span style=\"width:16px; height:16px; border-radius:5px; border:1px solid rgba(139,92,246,0.5); background:rgba(139,92,246,0.2);\"><\u002Fspan><div style=\"width:30px;height:30px;border-radius:8px;background:linear-gradient(140deg,#38BDF8,#7C3AED);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;\">MR<\u002Fdiv><div style=\"flex:1;\"><div style=\"font-size:13px; font-weight:600;\">Marina Rocha<\u002Fdiv><div style=\"font-size:11px; color:#6B6B76;\">Head de RH · TechCorp · via Vibe<\u002Fdiv><\u002Fdiv><\u002Fdiv><textarea style=\"width:100%; min-height:60px; resize:vertical; border-radius:10px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.02); color:#F4F4F7; padding:10px; font-family:'Plus Jakarta Sans'; font-size:12.5px;\">Oi Marina! Vi que você lidera RH na TechCorp. Estamos com uma turma de IA na Liderança — faz sentido pro seu time?<\u002Ftextarea><div style=\"font-size:10.5px; color:#6B6B76; margin-top:8px; display:flex; align-items:center; gap:6px;\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#B388FF\" stroke-width=\"2\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>vira lead, entra no Pipeline e a IA continua a conversa a partir desta mensagem<\u002Fdiv><\u002Fdiv>\n              <div style=\"border-radius:14px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); padding:16px;\"><div style=\"display:flex; align-items:center; gap:10px; margin-bottom:10px;\"><span style=\"width:16px; height:16px; border-radius:5px; border:1px solid rgba(139,92,246,0.5); background:rgba(139,92,246,0.2);\"><\u002Fspan><div style=\"width:30px;height:30px;border-radius:8px;background:linear-gradient(140deg,#FBBF24,#FB7185);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;\">PE<\u002Fdiv><div style=\"flex:1;\"><div style=\"font-size:13px; font-weight:600;\">Paulo Esteves<\u002Fdiv><div style=\"font-size:11px; color:#6B6B76;\">Diretor de Operações · Construtora Alfa · via Vibe<\u002Fdiv><\u002Fdiv><\u002Fdiv><textarea style=\"width:100%; min-height:60px; resize:vertical; border-radius:10px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.02); color:#F4F4F7; padding:10px; font-family:'Plus Jakarta Sans'; font-size:12.5px;\">Olá Paulo! Operação puxada normalmente vem de decisão manual demais. Te mostro como líderes usam IA pra ganhar tempo?<\u002Ftextarea><div style=\"font-size:10.5px; color:#6B6B76; margin-top:8px; display:flex; align-items:center; gap:6px;\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#B388FF\" stroke-width=\"2\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>vira lead, entra no Pipeline e a IA continua a conversa a partir desta mensagem<\u002Fdiv><\u002Fdiv>\n              <div style=\"display:flex; gap:10px;\"><button onclick=\"{{ aprovarEnviar }}\" style=\"flex:none; padding:11px 18px; border-radius:11px; border:1px solid rgba(255,255,255,0.12); background:transparent; color:#A1A1AA; font-family:'Plus Jakarta Sans'; font-weight:600; font-size:13px; cursor:pointer;\">Aprovar selecionados<\u002Fbutton><button onclick=\"{{ aprovarEnviar }}\" style=\"flex:1; padding:11px; border-radius:11px; border:none; background:linear-gradient(135deg,#7C3AED,#A855F7); color:#fff; font-family:'Plus Jakarta Sans'; font-weight:600; font-size:13px; cursor:pointer; box-shadow:0 12px 30px -12px rgba(139,92,246,.7);\">Aprovar e enviar<\u002Fbutton><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- CONFIGURAÇÕES (credenciais & integrações) -->\n      <sc-if value=\"{{ isConfig }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex; height:100%;\">\n          <div style=\"width:220px; flex:none; border-right:1px solid rgba(255,255,255,0.06); padding:18px 14px;\">\n            <div style=\"display:flex; flex-direction:column; gap:2px;\"><sc-for list=\"{{ configNav }}\" as=\"n\" hint-placeholder-count=\"2\"><button onclick=\"{{ n.onClick }}\" style=\"{{ n.style }}\">{{ n.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1; min-width:0; overflow-y:auto; padding:24px 28px;\">\n            <sc-if value=\"{{ isConfigInteg }}\" hint-placeholder-val=\"{{ true }}\">\n              <!-- health summary -->\n              <div style=\"display:flex; align-items:center; gap:11px; padding:14px 16px; border-radius:13px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); margin-bottom:18px;\">\n                <sc-if value=\"{{ healthAllOk }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display:flex; align-items:center; gap:8px; font-size:13px; font-weight:600; color:#34D399;\"><span style=\"width:8px;height:8px;border-radius:50%;background:#34D399;box-shadow:0 0 10px #34D399;\"><\u002Fspan>Tudo funcionando<\u002Fspan><\u002Fsc-if>\n                <sc-if value=\"{{ hasDesignSystem }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-size:12.5px; color:#A1A1AA;\">Cada login é um ambiente isolado · as chaves se auto-aplicam ao validar.<\u002Fspan><\u002Fsc-if>\n                <div style=\"flex:1;\"><\u002Fdiv>\n                <button onclick=\"{{ reverifyAll }}\" style=\"padding:8px 14px; border-radius:10px; border:1px solid rgba(139,92,246,0.4); background:rgba(139,92,246,0.1); color:#C9B6FF; font-family:'Plus Jakarta Sans'; font-size:12px; font-weight:600; cursor:pointer;\">Re-verificar tudo<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:22px;\">\n                <sc-for list=\"{{ healthCards }}\" as=\"h\" hint-placeholder-count=\"10\">\n                  <div style=\"border-radius:11px; border:1px solid rgba(255,255,255,0.07); background:rgba(255,255,255,0.02); padding:11px;\"><div style=\"display:flex; align-items:center; gap:6px;\"><span style=\"width:7px;height:7px;border-radius:50%;background:{{ h.dot }};\"><\u002Fspan><span style=\"font-size:10.5px; color:#A1A1AA; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ h.title }}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:9px; padding:11px 15px; border-radius:12px; background:rgba(139,92,246,0.07); border:1px solid rgba(139,92,246,0.22); margin-bottom:18px;\">\n                <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#B388FF\" stroke-width=\"1.8\"><path d=\"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z\"><\u002Fpath><\u002Fsvg>\n                <span style=\"font-size:12px; color:#C9B6FF;\">Chaves guardadas criptografadas; nunca expostas no front. Use Mostrar / Substituir / Rotacionar em cada segredo.<\u002Fspan>\n              <\u002Fdiv>\n              <!-- credential cards -->\n              <div style=\"display:flex; flex-direction:column; gap:14px;\">\n                <sc-for list=\"{{ gateCards }}\" as=\"c\" hint-placeholder-count=\"10\">\n                  <div style=\"border-radius:16px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); padding:18px;\">\n                    <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:14px;\">\n                      <div style=\"width:36px; height:36px; border-radius:10px; background:rgba(139,92,246,0.14); display:flex; align-items:center; justify-content:center; color:#B388FF; flex:none;\">{{ c.iconEl }}<\u002Fdiv>\n                      <div style=\"flex:1;\"><div style=\"display:flex; align-items:center; gap:8px;\"><span style=\"font-weight:600; font-size:14px;\">{{ c.title }}<\u002Fspan><span style=\"font-size:9.5px; font-weight:600; padding:1px 7px; border-radius:999px; {{ c.reqBadgeStyle }}\">{{ c.reqBadge }}<\u002Fspan><\u002Fdiv><div style=\"font-size:11.5px; color:#A1A1AA; margin-top:2px;\">{{ c.unlocks }}<\u002Fdiv><\u002Fdiv>\n                      <span style=\"{{ c.chip }}\">{{ c.chipLabel }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:10px;\">\n                      <sc-for list=\"{{ c.fields }}\" as=\"f\" hint-placeholder-count=\"2\">\n                        <div><label style=\"display:block; font-size:11px; color:#6B6B76; margin-bottom:5px;\">{{ f.label }}<\u002Flabel>\n                          <sc-if value=\"{{ f.hasSelect }}\" hint-placeholder-val=\"{{ false }}\"><select style=\"width:100%; border-radius:10px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.03); color:#F4F4F7; padding:9px 11px; font-size:12.5px; font-family:'Plus Jakarta Sans';\"><sc-for list=\"{{ f.select }}\" as=\"o\" hint-placeholder-count=\"2\"><option>{{ o }}<\u002Foption><\u002Fsc-for><\u002Fselect><\u002Fsc-if>\n                          <sc-if value=\"{{ f.secret }}\" hint-placeholder-val=\"{{ false }}\"><input value=\"••••••••••••\" style=\"width:100%; border-radius:10px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.03); color:#F4F4F7; padding:9px 11px; font-size:12.5px; font-family:'Plus Jakarta Sans';\"><\u002Fsc-if>\n                        <\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                    <div style=\"display:flex; align-items:center; gap:8px; margin-top:14px;\">\n                      <button onclick=\"{{ c.verify }}\" style=\"padding:8px 15px; border-radius:9px; border:1px solid rgba(139,92,246,0.4); background:rgba(139,92,246,0.1); color:#C9B6FF; font-family:'Plus Jakarta Sans'; font-size:12px; font-weight:600; cursor:pointer;\">Verificar / Testar<\u002Fbutton>\n                      <span style=\"font-size:11px; color:#6B6B76; cursor:pointer;\">Mostrar<\u002Fspan><span style=\"font-size:11px; color:#6B6B76; cursor:pointer;\">Substituir<\u002Fspan><span style=\"font-size:11px; color:#6B6B76; cursor:pointer;\">Rotacionar<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ isConfigFatura }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex; align-items:center; gap:11px; padding:14px 16px; border-radius:13px; background:rgba(139,92,246,0.07); border:1px solid rgba(139,92,246,0.22); margin-bottom:18px;\">\n                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#B388FF\" stroke-width=\"1.8\"><path d=\"M3 3v18h18\"><\u002Fpath><path d=\"M7 14l4-4 3 3 5-6\"><\u002Fpath><\u002Fsvg>\n                <span style=\"font-size:12.5px; color:#C9B6FF;\">Você usa suas próprias chaves — estes são os tokens, créditos e custos das APIs ativas neste ambiente, no mês atual.<\u002Fspan>\n                <div style=\"flex:1;\"><\u002Fdiv>\n                <div style=\"text-align:right;\"><div style=\"font-size:10.5px; color:#6B6B76;\">CUSTO ESTIMADO DO MÊS<\u002Fdiv><div style=\"font-family:'Space Grotesk'; font-size:18px; font-weight:600; color:#34D399;\">{{ apiTotalCost }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"border-radius:16px; border:1px solid rgba(255,255,255,0.08); overflow:hidden;\">\n                <div style=\"display:grid; grid-template-columns:1.6fr 1.4fr 1.7fr 1fr; padding:12px 18px; font-size:10.5px; color:#6B6B76; letter-spacing:.05em; border-bottom:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.02);\"><span>API<\u002Fspan><span>USO<\u002Fspan><span>PREÇO<\u002Fspan><span style=\"text-align:right;\">CUSTO · MÊS<\u002Fspan><\u002Fdiv>\n                <sc-for list=\"{{ apiUsage }}\" as=\"a\" hint-placeholder-count=\"7\">\n                  <div style=\"display:grid; grid-template-columns:1.6fr 1.4fr 1.7fr 1fr; padding:15px 18px; align-items:center; border-bottom:1px solid rgba(255,255,255,0.05);\">\n                    <div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"width:9px; height:9px; border-radius:50%; background:{{ a.color }}; flex:none;\"><\u002Fspan><div><div style=\"font-size:13px; font-weight:600;\">{{ a.name }}<\u002Fdiv><div style=\"font-size:11px; color:#6B6B76;\">{{ a.kind }}<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                    <div><div style=\"font-size:12px; color:#A1A1AA; margin-bottom:5px;\">{{ a.usage }}<\u002Fdiv><div style=\"height:5px; border-radius:999px; background:rgba(255,255,255,0.06); overflow:hidden;\"><div style=\"height:100%; width:{{ a.barW }}; background:{{ a.color }}; border-radius:999px;\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                    <div style=\"font-size:11.5px; color:#A1A1AA; line-height:1.4;\">{{ a.price }}<\u002Fdiv>\n                    <div style=\"text-align:right;\"><div style=\"font-family:'Space Grotesk'; font-size:14px; font-weight:600;\">{{ a.cost }}<\u002Fdiv><div style=\"display:inline-flex; align-items:center; gap:5px; font-size:10px; color:#6B6B76; margin-top:2px;\"><span style=\"width:6px;height:6px;border-radius:50%;background:{{ a.dot }};\"><\u002Fspan>{{ a.status }}<\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"font-size:11px; color:#6B6B76; margin-top:12px;\">Os preços são os das próprias APIs (pago direto ao provedor). O VendaFlow não cobra markup — é self-host.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- EMAIL TEMPLATES -->\n      <sc-if value=\"{{ emailTplList }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:24px 28px 60px;\">\n          <sc-if value=\"{{ hasDesignSystem }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex; align-items:center; gap:10px; padding:11px 15px; border-radius:12px; background:rgba(52,211,153,0.07); border:1px solid rgba(52,211,153,0.25); margin-bottom:20px;\">\n              <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#34D399\" stroke-width=\"2\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>\n              <span style=\"font-size:12.5px; color:#9FE7C5;\">Usando o Design System cadastrado — a IA segue marca, cores e tom ao gerar o corpo dos e-mails.<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:14px;\">\n            <sc-for list=\"{{ emailTemplates }}\" as=\"t\" hint-placeholder-count=\"6\">\n              <div onclick=\"{{ openEmailEditor }}\" style=\"border-radius:15px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); overflow:hidden; cursor:pointer;\" style-hover=\"border-color:rgba(139,92,246,0.4);\">\n                <div style=\"height:90px; background:linear-gradient(140deg,#1a1330,#0D0D13); display:flex; align-items:center; justify-content:center;\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"rgba(255,255,255,0.3)\" stroke-width= o logo<\u002Fdiv><div style=\"display:flex; align-items:center; gap:8px; margin-top:8px;\"><span style=\"font-size:11.5px; color:#A1A1AA;\">Cor do header<\u002Fspan><span style=\"width:22px; height:22px; border-radius:6px; background:#7C3AED; border:1px solid rgba(255,255,255,0.1);\"><\u002Fspan><\u002Fdiv><\u002Fdiv>\n              <div><div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;\"><span style=\"font-size:12px; font-weight:600;\">Corpo (conteúdo por IA)<\u002Fspan><button onclick=\"{{ genEmailBody }}\" style=\"display:flex; align-items:center; gap:5px; padding:4px 10px; border-radius:8px; border:1px solid rgba(139,92,246,0.4); background:rgba(139,92,246,0.1); color:#C9B6FF; font-family:'Plus Jakarta Sans'; font-size:10.5px; font-weight:600; cursor:pointer;\"><svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 3v4M3 5h4M13 3l2.5 6.5L22 12l-6.5 2.5L13 21l-2.5-6.5L4 12l6.5-2.5z\"><\u002Fpath><\u002Fsvg>Gerar com IA<\u002Fbutton><\u002Fdiv><textarea style=\"width:100%; min-height:80px; resize:vertical; border-radius:11px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.03); color:#F4F4F7; padding:11px; font-size:12.5px; font-family:'Plus Jakarta Sans';\">Olá {nome}! Seu acesso ao {produto} está pronto…<\u002Ftextarea><div style=\"display:flex; flex-wrap:wrap; gap:5px; margin-top:8px;\"><span style=\"font-size:10px; color:#B388FF; background:rgba(139,92,246,0.12); padding:2px 7px; border-radius:6px;\">{nome}<\u002Fspan><span style=\"font-size:10px; color:#B388FF; background:rgba(139,92,246,0.12); padding:2px 7px; border-radius:6px;\">{produto}<\u002Fspan><span style=\"font-size:10px; color:#B388FF; background:rgba(139,92,246,0.12); padding:2px 7px; border-radius:6px;\">{link_acesso}<\u002Fspan><span style=\"font-size:10px; color:#B388FF; background:rgba(139,92,246,0.12); padding:2px 7px; border-radius:6px;\">{valor}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n              <div><div style=\"font-size:12px; font-weight:600; margin-bottom:8px;\">Botão / CTA<\u002Fdiv><input value=\"Acessar o curso\" style=\"width:100%; border-radius:10px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.03); color:#F4F4F7; padding:9px 11px; font-size:12.5px; font-family:'Plus Jakarta Sans'; margin-bottom:7px;\"><input value=\"{link_acesso}\" style=\"width:100%; border-radius:10px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.03); color:#F4F4F7; padding:9px 11px; font-size:12.5px; font-family:'Plus Jakarta Sans';\"><\u002Fdiv>\n              <div><div style=\"font-size:12px; font-weight:600; margin-bottom:8px;\">Rodapé<\u002Fdiv><div style=\"font-size:11.5px; color:#A1A1AA; line-height:1.5;\">Nome da empresa, endereço, redes sociais e <span style=\"color:#FB7185;\">link de descadastro*<\u002Fspan> (obrigatório para não cair em spam).<\u002Fdiv><\u002Fdiv>\n              <div><div style=\"font-size:12px; font-weight:600; margin-bottom:8px;\">Estilo<\u002Fdiv><div style=\"display:flex; align-items:center; gap:8px;\"><span style=\"font-size:11.5px; color:#A1A1AA;\">Cor primária<\u002Fspan><span style=\"width:22px; height:22px; border-radius:6px; background:#7C3AED;\"><\u002Fspan><span style=\"font-size:11.5px; color:#A1A1AA; margin-left:8px;\">Largura<\u002Fspan><span style=\"font-size:11.5px;\">600px<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- right: live preview -->\n          <div style=\"flex:1; min-width:0; display:flex; flex-direction:column; background:rgba(0,0,0,0.25);\">\n            <div style=\"flex:none; display:flex; align-items:center; gap:12px; padding:14px 20px; border-bottom:1px solid rgba(255,255,255,0.06);\">\n              <div style=\"display:flex; gap:4px; padding:4px; border-radius:10px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);\"><button onclick=\"{{ setEmailDesk }}\" style=\"{{ emailDeskStyle }}; font-size:11.5px; padding:6px 14px;\">Desktop<\u002Fbutton><button onclick=\"{{ setEmailMob }}\" style=\"{{ emailMobStyle }}; font-size:11.5px; padding:6px 14px;\">Mobile<\u002Fbutton><\u002Fdiv>\n              <span style=\"display:flex; align-items:center; gap:6px; font-size:11px; color:#34D399;\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>Seguindo o Design System<\u002Fspan>\n              <div style=\"flex:1;\"><\u002Fdiv>\n              <button onclick=\"{{ testEmail }}\" style=\"padding:8px 14px; border-radius:9px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.04); color:#F4F4F7; font-family:'Plus Jakarta Sans'; font-size:12px; font-weight:600; cursor:pointer;\">Testar envio<\u002Fbutton>\n              <button onclick=\"{{ saveEmailTpl }}\" style=\"padding:8px 14px; border-radius:9px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.04); color:#F4F4F7; font-family:'Plus Jakarta Sans'; font-size:12px; font-weight:600; cursor:pointer;\">Salvar<\u002Fbutton>\n              <button onclick=\"{{ activateEmailTpl }}\" style=\"padding:8px 14px; border-radius:9px; border:none; background:linear-gradient(135deg,#7C3AED,#A855F7); color:#fff; font-family:'Plus Jakarta Sans'; font-size:12px; font-weight:600; cursor:pointer;\">Ativar<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"flex:1; overflow-y:auto; padding:30px; display:flex; justify-content:center;\">\n              <div style=\"width:{{ emailPreviewW }}; max-width:100%; background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 20px 60px -20px rgba(0,0,0,.8);\">\n                <div style=\"background:#7C3AED; padding:22px; text-align:center;\"><div style=\"color:#fff; font-family:'Space Grotesk'; font-weight:700; font-size:18px;\">Liderança IA<\u002Fdiv><\u002Fdiv>\n                <div style=\"padding:32px 28px; color:#1a1a25;\">\n                  <div style=\"font-family:'Space Grotesk'; font-size:20px; font-weight:600; margin-bottom:14px; color:#13131C;\">Seu acesso está pronto 🎯<\u002Fdiv>\n                  <div style=\"font-size:14px; line-height:1.6; color:#444;\">Olá <strong>Sérgio<\u002Fstrong>! Que bom ter você no <strong>Curso IA na Liderança<\u002Fstrong>. Tudo pronto para começar hoje mesmo — é só clicar no botão abaixo.<\u002Fdiv>\n                  <div style=\"text-align:center; margin:26px 0;\"><span style=\"display:inline-block; background:#7C3AED; color:#fff; padding:13px 30px; border-radius:10px; font-weight:600; font-size:14px;\">Acessar o curso<\u002Fspan><\u002Fdiv>\n                  <div style=\"font-size:13px; line-height:1.6; color:#666;\">Qualquer dúvida, responda este e-mail. Estamos com você.<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"padding:18px 28px; background:#f4f4f7; text-align:center;\"><div style=\"font-size:11px; color:#999;\">Liderança IA · São Paulo, BR<\u002Fdiv><div style=\"font-size:11px; color:#999; margin-top:6px;\">Não quer mais receber? <span style=\"color:#7C3AED; text-decoration:underline;\">Descadastrar<\u002Fspan><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n\n      <!-- LEADS (mirror) -->\n      <sc-if value=\"{{ isLeads }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:24px 28px 60px;\">\n          <div style=\"display:flex; align-items:center; gap:11px; padding:13px 16px; border-radius:13px; background:rgba(56,189,248,0.07); border:1px solid rgba(56,189,248,0.22); margin-bottom:20px;\">\n            <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#38BDF8\" stroke-width=\"1.6\" style=\"flex:none;\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 16v-4M12 8h.01\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font-size:12.5px; color:#9FD8F5;\">Esta é uma cópia do Pipeline, só para visualizar todos os leads em lista. Para agir (mover estágio, conversar, configurar IA), use o Pipeline.<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:18px;\">\n            <div style=\"border-radius:14px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); padding:15px;\"><div style=\"font-family:'Space Grotesk'; font-size:22px; font-weight:600;\">{{ leadsTotal }}<\u002Fdiv><div style=\"font-size:11px; color:#6B6B76;\">total de leads<\u002Fdiv><\u002Fdiv>\n            <div style=\"border-radius:14px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); padding:15px;\"><div style=\"font-family:'Space Grotesk'; font-size:22px; font-weight:600;\">{{ leadsNovos }}<\u002Fdiv><div style=\"font-size:11px; color:#6B6B76;\">novos<\u002Fdiv><\u002Fdiv>\n            <div style=\"border-radius:14px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); padding:15px;\"><div style=\"font-family:'Space Grotesk'; font-size:22px; font-weight:600;\">{{ leadsNegoc }}<\u002Fdiv><div style=\"font-size:11px; color:#6B6B76;\">em negociação<\u002Fdiv><\u002Fdiv>\n            <div style=\"border-radius:14px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); padding:15px;\"><div style=\"font-family:'Space Grotesk'; font-size:22px; font-weight:600; color:#FB7185;\">{{ leadsHot }}<\u002Fdiv><div style=\"font-size:11px; color:#6B6B76;\">quentes<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border-radius:16px; border:1px solid rgba(255,255,255,0.08); overflow:hidden;\">\n            <div style=\"display:grid; grid-template-columns:1.6fr 1.1fr 0.9fr 1fr 1fr 1.2fr; padding:13px 18px; font-size:11px; color:#6B6B76; letter-spacing:.04em; border-bottom:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.02);\">\n              <span onclick=\"{{ sortByName }}\" style=\"cursor:pointer;\">NOME ↕<\u002Fspan><span>ESTÁGIO<\u002Fspan><span>TEMP.<\u002Fspan><span>CANAL<\u002Fspan><span onclick=\"{{ sortByScore }}\" style=\"cursor:pointer;\">SCORE ↕<\u002Fspan><span>STATUS IA<\u002Fspan>\n            <\u002Fdiv>\n            <sc-for list=\"{{ leadRows }}\" as=\"r\" hint-placeholder-count=\"6\">\n              <div onclick=\"{{ r.open }}\" style=\"display:grid; grid-template-columns:1.6fr 1.1fr 0.9fr 1fr 1fr 1.2fr; padding:13px 18px; align-items:center; border-bottom:1px solid rgba(255,255,255,0.05); font-size:13px; cursor:pointer;\" style-hover=\"background:rgba(255,255,255,0.03);\">\n                <span style=\"display:flex; align-items:center; gap:10px;\"><span style=\"width:28px; height:28px; border-radius:8px; background:{{ r.avBg }}; display:flex; align-items:center; justify-content:center; font-size:10.5px; font-weight:700; color:#fff;\">{{ r.initials }}<\u002Fspan>{{ r.name }}<\u002Fspan>\n                <span style=\"color:#A1A1AA; font-size:12px;\">{{ r.stage }}<\u002Fspan>\n                <span style=\"font-size:12px; color:{{ r.tempColor }};\">{{ r.temp }}<\u002Fspan>\n                <span style=\"color:#A1A1AA; font-size:12px;\">{{ r.channel }}<\u002Fspan>\n                <span style=\"font-family:'Space Grotesk'; font-weight:600; color:#B388FF;\">{{ r.score }}<\u002Fspan>\n                <span style=\"{{ r.aiBadge }}\">{{ r.aiLabel }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ROI & FINANÇAS -->\n      <sc-if value=\"{{ isRoi }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:24px 28px 60px;\">\n          <div style=\"display:flex; gap:2px; border-bottom:1px solid rgba(255,255,255,0.06); margin-bottom:22px;\"><sc-for list=\"{{ roiTabs }}\" as=\"t\" hint-placeholder-count=\"3\"><button onclick=\"{{ t.onClick }}\" style=\"
