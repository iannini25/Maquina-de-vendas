600;\">Biblioteca de templates<\u002Fdiv><button onclick=\"{{ addTemplate }}\" style=\"padding:8px 14px; border-radius:9px; border:1px solid rgba(139,92,246,0.4); background:rgba(139,92,246,0.1); color:#C9B6FF; font-family:'Plus Jakarta Sans'; font-size:12px; font-weight:600; cursor:pointer;\">Adicionar template<\u002Fbutton><\u002Fdiv>\n            <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:12px;\">\n              <div onclick=\"{{ openTemplate }}\" style=\"border-radius:13px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); overflow:hidden; cursor:pointer;\" style-hover=\"border-color:rgba(139,92,246,0.4);\"><div style=\"height:90px; background:radial-gradient(circle at 50% 0,rgba(124,58,237,0.35),#13131C 70%);\"><\u002Fdiv><div style=\"padding:11px 13px; font-size:12.5px; font-weight:500;\">VSL Centralizada<\u002Fdiv><\u002Fdiv>\n              <div onclick=\"{{ openTemplate }}\" style=\"border-radius:13px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); overflow:hidden; cursor:pointer;\" style-hover=\"border-color:rgba(139,92,246,0.4);\"><div style=\"height:90px; background:linear-gradient(140deg,#1A1A25,#0D0D13);\"><\u002Fdiv><div style=\"padding:11px 13px; font-size:12.5px; font-weight:500;\">Webinar / Live<\u002Fdiv><\u002Fdiv>\n              <div onclick=\"{{ openTemplate }}\" style=\"border-radius:13px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); overflow:hidden; cursor:pointer;\" style-hover=\"border-color:rgba(139,92,246,0.4);\"><div style=\"height:90px; background:linear-gradient(140deg,#231a3a,#0D0D13);\"><\u002Fdiv><div style=\"padding:11px 13px; font-size:12.5px; font-weight:500;\">Oferta direta<\u002Fdiv><\u002Fdiv>\n              <div onclick=\"{{ addTemplate }}\" style=\"border-radius:13px; border:1px dashed rgba(255,255,255,0.15); display:flex; align-items:center; justify-content:center; min-height:127px; cursor:pointer; color:#B388FF; font-size:12.5px;\" style-hover=\"border-color:rgba(139,92,246,0.4);\">+ Adicionar template<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- GENERIC PLACEHOLDER SCREEN -->\n      <sc-if value=\"{{ isStub }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:60px 28px; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center;\">\n          <div style=\"width:60px; height:60px; border-radius:16px; border:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; color:#6B6B76; margin-bottom:18px;\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 8v4M12 16h.01\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk'; font-size:18px; font-weight:600;\">{{ topTitle }}<\u002Fdiv>\n          <div style=\"font-size:13px; color:#6B6B76; margin-top:6px;\">Tela em construção neste protótipo.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  <!-- ===== OVERLAYS ===== -->\n\n  <!-- LEAD SLIDE-OVER -->\n  <sc-if value=\"{{ leadPanelOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeLead }}\" style=\"position:fixed; inset:0; z-index:80; background:rgba(4,4,8,0.6); backdrop-filter:blur(4px);\"><\u002Fdiv>\n    <div style=\"position:fixed; top:0; right:0; bottom:0; width:560px; max-width:92vw; z-index:81; background:#0D0D13; border-left:1px solid rgba(255,255,255,0.08); display:flex; flex-direction:column; animation:vf-slideover .44s cubic-bezier(.16,1,.3,1); box-shadow:-20px 0 60px -20px rgba(0,0,0,.7);\">\n      <div style=\"position:absolute; top:0; left:0; right:0; height:120px; background:radial-gradient(circle at 70% 0,rgba(139,92,246,0.25),transparent 70%); pointer-events:none;\"><\u002Fdiv>\n      <div style=\"position:relative; padding:20px 22px; border-bottom:1px solid rgba(255,255,255,0.06);\">\n        <div style=\"display:flex; align-items:flex-start; gap:13px;\">\n          <div style=\"width:46px; height:46px; border-radius:13px; background:{{ leadData.avBg }}; display:flex; align-items:center; justify-content:center; font-weight:700; color:#fff; flex:none;\">{{ leadData.initials }}<\u002Fdiv>\n          <div style=\"flex:1; min-width:0;\">\n            <div style=\"font-family:'Space Grotesk'; font-size:18px; font-weight:600;\">{{ leadData.name }}<\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:8px; margin-top:6px;\"><span style=\"{{ leadData.tempBadge }}\">{{ leadData.tempLabel }}<\u002Fspan><span style=\"{{ leadData.aiBadge }}\">{{ leadData.aiLabel }}<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ closeLead }}\" style=\"width:32px; height:32px; border-radius:9px; border:1px solid rgba(255,255,255,0.08); background:transparent; color:#A1A1AA; cursor:pointer; flex:none;\" style-hover=\"border-color:rgba(255,255,255,0.2);\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <button onclick=\"{{ goInbox }}\" style=\"margin-top:14px; width:100%; padding:10px; border-radius:11px; border:none; cursor:pointer; background:linear-gradient(135deg,#7C3AED,#A855F7); color:#fff; font-family:'Plus Jakarta Sans'; font-weight:600; font-size:13px; box-shadow:0 12px 30px -12px rgba(139,92,246,.7);\" style-hover=\"\">Abrir conversa<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:2px; padding:0 16px; border-bottom:1px solid rgba(255,255,255,0.06);\">\n        <sc-for list=\"{{ leadTabs }}\" as=\"t\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"flex:1; overflow-y:auto; padding:20px 22px;\">\n        <sc-if value=\"{{ leadTabOverview }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:start;\">\n            <div style=\"display:flex; flex-direction:column; gap:0;\">\n              <div style=\"font-size:11px; color:#6B6B76; letter-spacing:.05em; margin-bottom:4px;\">DADOS DO LEAD<\u002Fdiv>\n              <sc-for list=\"{{ leadFields }}\" as=\"fld\" hint-placeholder-count=\"6\">\n                <div style=\"display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05);\">\n                  <span style=\"font-size:12.5px; color:#6B6B76;\">{{ fld.k }}<\u002Fspan>\n                  <span style=\"font-size:13px; font-weight:500; text-align:right;\">{{ fld.v }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:14px;\">\n              <div style=\"border-radius:13px; border:1px solid rgba(139,92,246,0.25); background:rgba(139,92,246,0.08); padding:15px;\">\n                <div style=\"font-size:11px; font-weight:600; color:#B388FF; letter-spacing:.04em; margin-bottom:7px;\">PRÓXIMA AÇÃO RECOMENDADA (IA)<\u002Fdiv>\n                <div style=\"font-size:13px; line-height:1.5;\">{{ leadData.nextAction }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"border-radius:13px; border:1px solid rgba(255,255,255,0.08); padding:15px;\">\n                <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;\"><span style=\"font-size:13px; font-weight:600;\">Score<\u002Fspan><span style=\"font-family:'Space Grotesk'; font-weight:600; font-size:16px; color:#B388FF;\">{{ leadData.score }}<\u002Fspan><\u002Fdiv>\n                <div style=\"height:6px; border-radius:999px; background:rgba(255,255,255,0.06); overflow:hidden;\"><div style=\"height:100%; width:{{ leadData.scoreW }}; background:linear-gradient(90deg,#7C3AED,#B388FF);\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"font-size:11.5px; color:#6B6B76; margin-top:11px; line-height:1.55;\">Fatores: engajou na live · respondeu em &lt;5min · cargo de liderança · objeção de preço pendente.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ leadTabConversa }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex; flex-direction:column; gap:10px;\">\n            <div style=\"align-self:flex-start; max-width:80%; padding:10px 13px; border-radius:13px 13px 13px 4px; background:#1A1A25; font-size:12.5px;\">Oi, vi a live de vocês. Esse curso serve pra quem já lidera time?<\u002Fdiv>\n            <div style=\"align-self:flex-end; max-width:80%; padding:10px 13px; border-radius:13px 13px 4px 13px; background:linear-gradient(135deg,#7C3AED,#8B5CF6); font-size:12.5px; color:#fff;\">Serve sim! É feito justamente pra líderes que querem usar IA no dia a dia da gestão. Posso te mostrar como?<\u002Fdiv>\n            <div style=\"text-align:center; font-size:10.5px; color:#6B6B76;\">IA respondeu · há 4 min<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ leadTabNotas }}\" hint-placeholder-val=\"{{ false }}\">\n          <textarea placeholder=\"Escreva uma nota interna…\" style=\"width:100%; min-height:90px; resize:vertical; border-radius:11px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.03); color:#F4F4F7; padding:12px; font-family:'Plus Jakarta Sans'; font-size:13px;\"><\u002Ftextarea>\n          <div style=\"margin-top:14px; border-left:2px solid rgba(139,92,246,0.5); padding:4px 0 4px 12px;\"><div style=\"font-size:12.5px;\">Mencionou que decide junto com o sócio. Bom mandar material de ROI.<\u002Fdiv><div style=\"font-size:11px; color:#6B6B76; margin-top:3px;\">Você · ontem<\u002Fdiv><\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ leadTabAtividade }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex; flex-direction:column; gap:0;\">\n            <sc-for list=\"{{ leadActivity }}\" as=\"a\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex; gap:12px; padding-bottom:16px;\">\n                <div style=\"display:flex; flex-direction:column; align-items:center;\"><span style=\"width:9px; height:9px; border-radius:50%; background:#B388FF; margin-top:4px;\"><\u002Fspan><span style=\"flex:1; width:1px; background:rgba(255,255,255,0.1);\"><\u002Fspan><\u002Fdiv>\n                <div><div style=\"font-size:12.5px;\">{{ a.txt }}<\u002Fdiv><div style=\"font-size:11px; color:#6B6B76; margin-top:2px;\">{{ a.time }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"flex:none; padding:14px 22px; border-top:1px solid rgba(255,255,255,0.06); display:flex; gap:10px;\">\n        <button onclick=\"{{ assumirConversa }}\" style=\"flex:1; padding:11px; border-radius:11px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.04); color:#F4F4F7; font-family:'Plus Jakarta Sans'; font-weight:600; font-size:13px; cursor:pointer;\" style-hover=\"border-color:rgba(139,92,246,0.4);\">Assumir conversa<\u002Fbutton>\n        <button onclick=\"{{ openPerdido }}\" style=\"width:44px; padding:11px; border-radius:11px; border:1px solid rgba(255,255,255,0.12); background:transparent; color:#A1A1AA; cursor:pointer;\" style-hover=\"border-color:rgba(251,113,133,0.4); color:#FB7185;\">⋯<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- SDR SLIDE-OVER -->\n  <sc-if value=\"{{ sdrPanelOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeSdr }}\" style=\"position:fixed; inset:0; z-index:80; background:rgba(4,4,8,0.6); backdrop-filter:blur(4px);\"><\u002Fdiv>\n    <div style=\"position:fixed; top:0; right:0; bottom:0; width:520px; max-width:92vw; z-index:81; background:#0D0D13; border-left:1px solid rgba(255,255,255,0.08); display:flex; flex-direction:column; animation:vf-slideover .44s cubic-bezier(.16,1,.3,1); box-shadow:-20px 0 60px -20px rgba(0,0,0,.7);\">\n      <div style=\"position:absolute; top:0; left:0; right:0; height:130px; background:radial-gradient(circle at 70% 0,rgba(139,92,246,0.3),transparent 70%); pointer-events:none;\"><\u002Fdiv>\n      <div style=\"position:relative; padding:20px 22px; border-bottom:1px solid rgba(255,255,255,0.06);\">\n        <div style=\"display:flex; align-items:center; justify-content:space-between;\">\n          <div style=\"display:flex; align-items:center; gap:8px;\"><span style=\"width:8px;height:8px;border-radius:50%;background:#B388FF;animation:vf-pulse 2s infinite;\"><\u002Fspan><span style=\"font-size:11px; font-weight:600; color:#B388FF; letter-spacing:.05em;\">SDR DE IA · ESTE ESTÁGIO<\u002Fspan><\u002Fdiv>\n          <button onclick=\"{{ closeSdr }}\" style=\"width:32px; height:32px; border-radius:9px; border:1px solid rgba(255,255,255,0.08); background:transparent; color:#A1A1AA; cursor:pointer;\" style-hover=\"border-color:rgba(255,255,255,0.2);\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"font-family:'Space Grotesk'; font-size:20px; font-weight:600; margin-top:10px;\">{{ sdrStage }}<\u002Fdiv>\n        <div style=\"font-size:12.5px; color:#A1A1AA; margin-top:3px;\">Defina como o vendedor de IA age com leads neste estágio.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1; overflow-y:auto; padding:20px 22px; display:flex; flex-direction:column; gap:18px;\">\n        <div>\n          <div style=\"font-size:12.5px; font-weight:600; margin-bottom:9px;\">Como configurar<\u002Fdiv>\n          <div style=\"display:flex; gap:4px; padding:4px; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);\">\n            <button onclick=\"{{ setPbManual }}\" style=\"{{ pbManualStyle }}\">Configurar manual<\u002Fbutton>\n            <button onclick=\"{{ setPbMarkdown }}\" style=\"{{ pbMarkdownStyle }}\">Anexar markdown<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ pbManual }}\" hint-placeholder-val=\"{{ true }}\">\n        <div>\n          <label style=\"display:block; font-size:12.5px; font-weight:600; margin-bottom:7px;\">Objetivo neste estágio<span style=\"color:#B388FF;\">*<\u002Fspan><\u002Flabel>\n          <input value=\"{{ sdrObjective }}\" style=\"width:100%; border-radius:11px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.03); color:#F4F4F7; padding:11px 13px; font-family:'Plus Jakarta Sans'; font-size:13px;\">\n        <\u002Fdiv>\n        <div>\n          <label style=\"display:block; font-size:12.5px; font-weight:600; margin-bottom:7px;\">Instruções e tom<\u002Flabel>\n          <textarea style=\"width:100%; min-height:80px; resize:vertical; border-radius:11px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.03); color:#F4F4F7; padding:11px 13px; font-family:'Plus Jakarta Sans'; font-size:13px;\">Apresente o curso com clareza, crie rapport e descubra a dor de liderança. Não fale de preço sem ser perguntado.<\u002Ftextarea>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:12.5px; font-weight:600; margin-bottom:10px;\">Ações liberadas<\u002Fdiv>\n          <sc-for list=\"{{ sdrActions }}\" as=\"ac\" hint-placeholder-count=\"3\">\n            <div onclick=\"{{ ac.toggle }}\" style=\"display:flex; align-items:center; justify-content:space-between; padding:10px 0; cursor:pointer;\">\n              <span style=\"font-size:13px;\">{{ ac.label }}<\u002Fspan>\n              <span style=\"{{ ac.track }}\"><span style=\"{{ ac.knob }}\"><\u002Fspan><\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div>\n          <label style=\"display:block; font-size:12.5px; font-weight:60
